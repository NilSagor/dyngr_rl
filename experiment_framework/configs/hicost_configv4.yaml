model:
  name: "HiCoSTv4"
  hidden_dim: 172               # Match TAWRMAC embedding size
  memory_dim: 172
  time_dim: 64
  dropout: 0.1
  use_st_ode: false             # Disable ODE (heavy, not needed)
  use_multi_scale_walks: false  # Single scale only
  use_hct_hierarchical: false   # Simple pooling
  use_gated_refinement: false   # Simple concat
  use_prototype_attention: false # Single prototype (like TAWRMAC)
  use_hard_negative_mining: true # Keep HNM for better negatives
  num_walks_short: 10           # Enough walks
  walk_length_short: 3
  num_walks_long: 0
  num_walks_tawr: 0

training:
  batch_size: 512
  learning_rate: 0.0003         # Higher LR for faster convergence
  weight_decay: 1e-5
  max_epochs: 30
  gradient_clip_val: 1.0
  patience: 10
  val_check_interval: 0.5  
  gradient_clip_algorithm: "norm"
  log_every_n_steps: 10
  lr_scheduler: "cosine"
  warmup_epochs: 0.1
  min_lr_ratio: 0.01
  continuous_time: True
  
  # weight_decay: 0.00001      #  No quotes!  
  
  



data:
  dataset: "reddit"
  negative_sampling_strategy: "random"
  shuffle: true                 # Overridden by code, but keep
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  max_neighbors: 20
  evaluation_type: "transductive"
  negative_sampling_strategy: "random"
  unseen_ratio: 0.1
  validate_batches: True

# Experiment parameters
experiment:
  # name: "${model.name}_${data.evaluation_type}_${data.negative_sampling_strategy}"
  # description: "${model.name} on ${data.dataset} |${data.evaluation_type}|${data.negative_sampling_strategy}"
  name: "HiCoSTv4_modified"
  description: "HiCoST v4 for speeding training"
  seed: 42  
  device: "auto"  # auto, cpu, cuda
  precision: 32
  debug: True
  compile: False


# Logging
logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  save_top_k: 3
  monitor: "val_ap"
  mode: "max"
  
# Evaluation
evaluation:
  metrics: ["accuracy", "ap", "auc"]
  test_batch_size: 1000

profiling:
  enabled: true
  profile_type: 'pytorch'


# Hardware
hardware:
  gpus: 1  # null for CPU, number for GPU count, 2 for 5090
  num_workers: 4 # scale with gpus count if gpus 2, workers 8
  pin_memory: False